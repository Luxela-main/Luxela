name: Daily Escrow Maintenance

on:
  schedule:
    # Run daily at midnight UTC
    - cron: '0 0 * * *'
  
  # Allow manual trigger from Actions tab
  workflow_dispatch:

jobs:
  escrow-maintenance:
    runs-on: ubuntu-latest
    env:
      API_URL: ${{ secrets.API_URL }}
      CRON_SECRET: ${{ secrets.CRON_SECRET }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate required secrets
        run: |
          set -euo pipefail
          if [ -z "${API_URL:-}" ]; then
            echo "ERROR: API_URL secret is not set"
            exit 1
          fi
          if [ -z "${CRON_SECRET:-}" ]; then
            echo "ERROR: CRON_SECRET secret is not set"
            exit 1
          fi
          echo "Secrets validated."

      - name: Run escrow daily maintenance
        run: |
          set -euo pipefail
          echo "🕐 Running daily escrow maintenance..."

          response=$(curl --silent --show-error --write-out "\nHTTP_STATUS:%{http_code}" \
            -X POST \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "${API_URL}/api/trpc/cron.dailyMaintenance" \
            -d '{"input":{}}')

          echo "$response"
          http_status=$(printf "%s" "$response" | awk -F"HTTP_STATUS:" '{print $2}' | tr -d '\r' | tr -d '\n')

          if [ -z "$http_status" ]; then
            echo "ERROR: Failed to determine HTTP status from response"
            exit 1
          fi

          if [ "$http_status" -lt 200 ] || [ "$http_status" -ge 300 ]; then
            echo "ERROR: Escrow maintenance endpoint returned status $http_status"
            exit 1
          fi

          echo "Escrow maintenance completed successfully."

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const repoUrl =
              github.context.payload.repository?.html_url ||
              `https://github.com/${github.context.repo.owner}/${github.context.repo.repo}`;
            const runId = github.context.runId || process.env.GITHUB_RUN_ID;

            await github.rest.issues.create({
              owner: github.context.repo.owner,
              repo: github.context.repo.repo,
              title: '❌ Escrow Maintenance Job Failed',
              body: `The daily escrow maintenance workflow failed on ${new Date().toISOString()}.\n\nPlease check the [workflow logs](${repoUrl}/actions/runs/${runId}).`,
              labels: ['bug', 'automation']
            });